{# -*- mode: jinja2 -*- #}
{% extends 'base.html' %}

{% block title -%}
  {{ SITENAME }} &mdash; Tags
{%- endblock %}

{% block content %}
  <header class="b-theme mb-8 pb-6 border-b">
    <h2 class="c-text text-2xl font-bold">Tags</h2>
  </header>

  <div class="flex flex-wrap gap-2">
    {% for tag, articles in tags | sort %}
      <a href="{{ SITEURL }}/{{ tag.url }}" class="tag-chip">
        <i class="fa-solid fa-tag fa-xs" aria-hidden="true"></i>{{ tag }}
        <span class="ml-1 text-xs opacity-70">({{ articles | count }})</span>
      </a>
    {% endfor %}
  </div>
{% endblock %}
