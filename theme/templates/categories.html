{# -*- mode: jinja2 -*- #}
{% extends 'base.html' %}

{% block title -%}
  {{ SITENAME }} &mdash; Categories
{%- endblock %}

{% block content %}
  <header class="b-theme mb-8 pb-6 border-b">
    <h2 class="c-text text-2xl font-bold">Categories</h2>
  </header>

  <ul class="space-y-2">
    {% for category, articles in categories | sort %}
      <li class="flex items-center gap-3">
        <a href="{{ SITEURL }}/{{ category.url }}" class="c-accent no-underline hover:underline font-medium">
          <i class="fa-solid fa-folder-open fa-xs mr-1" aria-hidden="true"></i>{{ category }}
        </a>
        <span class="c-muted text-sm">({{ articles | count }})</span>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
