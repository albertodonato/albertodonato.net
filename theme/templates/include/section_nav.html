{# -*- mode: jinja2 -*- #}
<nav class="section-nav" aria-label="Section navigation">
  <div class="nav-inner">
    <a href="{{ SITEURL }}/{{ INDEX_URL }}" class="section-nav-link" aria-label="Home">
      <i class="fa-solid fa-house nav-icon" aria-hidden="true"></i><span class="nav-label">Home</span>
    </a>
    {% if ARCHIVES_URL %}
      <a href="{{ SITEURL }}/{{ ARCHIVES_URL }}" class="section-nav-link" aria-label="Archives">
        <i class="fa-solid fa-box-archive nav-icon" aria-hidden="true"></i><span class="nav-label">Archives</span>
      </a>
    {% endif %}
    {% if CATEGORIES_URL %}
      <a href="{{ SITEURL }}/{{ CATEGORIES_URL }}" class="section-nav-link" aria-label="Categories">
        <i class="fa-solid fa-folder nav-icon" aria-hidden="true"></i><span class="nav-label">Categories</span>
      </a>
    {% endif %}
    {% if TAGS_URL %}
      <a href="{{ SITEURL }}/{{ TAGS_URL }}" class="section-nav-link" aria-label="Tags">
        <i class="fa-solid fa-tags nav-icon" aria-hidden="true"></i><span class="nav-label">Tags</span>
      </a>
    {% endif %}
    {% if FEED_ALL_ATOM or FEED_ALL_RSS %}
      <a href="{{ SITEURL }}/{% if FEED_ALL_ATOM %}{{ FEED_ALL_ATOM }}{% else %}{{ FEED_ALL_RSS }}{% endif %}" class="section-nav-link" aria-label="RSS">
        <i class="fa-solid fa-rss nav-icon" aria-hidden="true"></i><span class="nav-label">RSS</span>
      </a>
    {% endif %}
    {% include 'include/search.html' %}
    <div class="nav-end">
      {% include 'include/theme_selector.html' %}
    </div>
  </div>
</nav>
