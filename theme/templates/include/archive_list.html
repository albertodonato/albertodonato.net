{# -*- mode: jinja2 -*- #}
{# expects: dates #}
<dl class="archive-list">
  {% for article in dates %}
    <div class="archive-item">
      <dt class="c-muted">{{ article.locale_date }}</dt>
      <dd><a href="{{ SITEURL }}/{{ article.url }}" class="c-text">{{ article.title }}</a></dd>
    </div>
  {% endfor %}
</dl>
