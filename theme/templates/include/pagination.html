{# -*- mode: jinja2 -*- #}
{% if DEFAULT_PAGINATION %}
  <nav class="pagination" aria-label="Post navigation">
    {% if articles_page.has_previous() %}
      <a href="{{ SITEURL }}/{{ articles_previous_page.url }}" class="c-accent">
        <i class="fa-solid fa-arrow-left fa-xs" aria-hidden="true"></i> Newer
      </a>
    {% else %}
      <span class="c-muted">&larr; Newer</span>
    {% endif %}
    <span class="c-muted">Page {{ articles_page.number }} of {{ articles_page.paginator.num_pages }}</span>
    {% if articles_page.has_next() %}
      <a href="{{ SITEURL }}/{{ articles_next_page.url }}" class="c-accent">
        Older <i class="fa-solid fa-arrow-right fa-xs" aria-hidden="true"></i>
      </a>
    {% else %}
      <span class="c-muted">Older &rarr;</span>
    {% endif %}
  </nav>
{% endif %}
